name: Release

on:
  workflow_dispatch:
    inputs:
      crate:
        description: "Crate to release (looprs-core | looprs | looprs-cli | all)"
        required: true
        default: all
      bump:
        description: "Version bump (patch | minor | major)"
        required: true
        default: patch

env:
  RUST_BACKTRACE: 1

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-rail
        run: cargo install cargo-rail

      - name: Check release readiness
        run: |
          if [ "${{ inputs.crate }}" = "all" ]; then
            cargo rail release check --all
          else
            cargo rail release check ${{ inputs.crate }}
          fi

      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ "${{ inputs.crate }}" = "all" ]; then
            cargo rail release run --all --bump ${{ inputs.bump }}
          else
            cargo rail release run ${{ inputs.crate }} --bump ${{ inputs.bump }}
          fi
