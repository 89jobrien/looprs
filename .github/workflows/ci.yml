name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Install tools
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest,cargo-deny,cargo-machete

      - name: Install taskit + cargo-rail
        run: cargo install taskit cargo-rail

      - name: Plan (surface visibility)
        run: cargo rail graph --since HEAD~1 || true

      - name: Run CI
        run: cargo rail run --workflow ci --all

      - name: Security & license audit
        run: cargo deny check

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov + cargo-rail
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Install taskit + cargo-rail
        run: cargo install taskit cargo-rail

      - name: Generate coverage
        run: cargo rail run --workflow coverage --all

      - name: Upload to codecov.io
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  fuzz:
    name: Fuzz (30s)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2

      - name: Install taskit
        run: cargo install taskit

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz

      - name: Fuzz fuzz_parse_skill
        run: taskit fuzz fuzz_parse_skill --duration 30
        working-directory: fuzz

      - name: Fuzz fuzz_strip_ansi
        run: taskit fuzz fuzz_strip_ansi --duration 30
        working-directory: fuzz
