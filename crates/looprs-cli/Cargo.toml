[package]
name = "looprs-cli"
version = "0.2.0"
edition = "2024"
description = "looprs binary: interactive REPL and scriptable entrypoint"
license = "MIT"
rust-version = "1.88"

[[bin]]
name = "looprs"
path = "src/main.rs"

[dependencies]
looprs = { path = "../.." }
anyhow = "1.0"
colored = "2.1"
rustyline = { version = "14.0", features = ["custom-bindings"] }
tokio = { version = "1.38", features = ["macros", "rt-multi-thread"] }
serde_json = "1.0"

[dev-dependencies]
tempfile = "3.12"
