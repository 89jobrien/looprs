targets = []

[unify]
include_paths = true
include_renamed = false
pin_transitives = false
transitive_host = "root"
exclude = []
include = []
max_backups = 3
msrv = true
enforce_msrv_inheritance = false
msrv_source = "max"
prune_dead_features = true
preserve_features = []
strict_version_compat = true
exact_pin_handling = "warn"
major_version_conflict = "warn"
detect_unused = true
compiler_diag_cache = true
remove_unused = true
detect_undeclared_features = true
fix_undeclared_features = true
skip_undeclared_patterns = [
    "default",
    "std",
    "alloc",
    "*_backend",
    "*_impl",
]
sort_dependencies = true

[release]
tag_prefix = "v"
tag_format = "{crate}-{prefix}{version}"
require_clean = true
publish_delay = 5
create_github_release = true
sign_tags = true
changelog_path = "CHANGELOG.md"
changelog_relative_to = "crate"
skip_changelog_for = []
require_changelog_entries = false
require_release_notes = true

[change-detection]
infrastructure = [
    ".github/**",
    ".devcontainer/**",
    ".config/rail.toml",
    "taskit.toml",
    "taskit-protocol.lock",
    "deny.toml",
    "*.sh",
    "Makefile",
    "makefile",
    "GNUmakefile",
    ".pre-commit-config.yaml",
    "cliff.toml",
    "release.toml",
    "release-plz.toml",
]
conservative_unclassified_owner_fallback = true
confidence_profile = "balanced"
bot_pr_confidence_profile = "strict"

[change-detection.custom]

[run]
default_profile = "local"

[run.profile.local]
surfaces = [
    "build",
    "test",
]
run_args = []
merge_base = true

[run.profile.ci]
surfaces = [
    "build",
    "test",
    "docs",
]
run_args = [
    "--all-targets",
    "--all-features",
]

[run.profile.coverage]
surfaces = ["test"]
run_args = ["--all-features"]

[run.workflow]
ci = "ci"
coverage = "coverage"

[crates.xtask.release]
publish = false

[crates.looprs-cli.release]
publish = true

[crates.looprs.release]
publish = true

[crates.looprs-core.release]
publish = true
